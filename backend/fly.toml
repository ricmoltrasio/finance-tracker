app = "finance-tracker-backend"
primary_region = "mxp"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[env]
  ENV = "production"
  LOG_LEVEL = "INFO"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
